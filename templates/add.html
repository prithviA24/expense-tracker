{% extends "base.html" %}
{% block content %}

<h1>Add Expense</h1>

<form method="POST">
    <label>Name</label>
    <input type="text" name="name" placeholder="e.g. Lunch" required>

    <label>Amount (₹)</label>
    <input type="number" name="amount" step="0.01" placeholder="e.g. 150" required>

    <label>Category</label>
    <select name="category">
        <option>Food</option>
        <option>Transport</option>
        <option>Shopping</option>
        <option>Bills</option>
        <option>Entertainment</option>
        <option>Other</option>
    </select>

    <label>Date</label>
    <input type="date" name="date" value="{{ today }}" required>

    <button type="submit">Add Expense</button>
</form>

{% endblock %}
