name: Expense Tracker CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test Flask import
        run: python -c "import app"

      - name: Build Docker image
        run: docker build -t expense-tracker .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Docker image
        run: docker tag expense-tracker ${{ secrets.DOCKER_USERNAME }}/expense-tracker:latest

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/expense-tracker:latest